  <rect x="12" y="100" width="276" height="32" fill="url(#topGrad)"/>

  <!-- Header grid pattern -->
  <g opacity="0.08" clip-path="url(#topClip)">
    <line x1="40" y1="12" x2="40" y2="132" stroke="white" stroke-width="0.5"/>
    <line x1="80" y1="12" x2="80" y2="132" stroke="white" stroke-width="0.5"/>
    <line x1="120" y1="12" x2="120" y2="132" stroke="white" stroke-width="0.5"/>
    <line x1="160" y1="12" x2="160" y2="132" stroke="white" stroke-width="0.5"/>
    <line x1="200" y1="12" x2="200" y2="132" stroke="white" stroke-width="0.5"/>
    <line x1="240" y1="12" x2="240" y2="132" stroke="white" stroke-width="0.5"/>
    <line x1="12" y1="32" x2="288" y2="32" stroke="white" stroke-width="0.5"/>
    <line x1="12" y1="52" x2="288" y2="52" stroke="white" stroke-width="0.5"/>
    <line x1="12" y1="72" x2="288" y2="72" stroke="white" stroke-width="0.5"/>
    <line x1="12" y1="92" x2="288" y2="92" stroke="white" stroke-width="0.5"/>
    <line x1="12" y1="112" x2="288" y2="112" stroke="white" stroke-width="0.5"/>
