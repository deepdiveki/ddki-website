  <text x="268" y="100" text-anchor="end" fill="white" font-size="10" font-weight="500" font-family="system-ui, -apple-system, sans-serif" opacity="0.9">70%</text>

  <!-- Content area -->
  <!-- Module card 1 - Completed -->
  <rect x="24" y="148" width="252" height="62" rx="10" fill="white" filter="url(#shadow1)"/>
  <circle cx="46" cy="179" r="12" fill="#E8F5E9"/>
  <path d="M40,179 L44,183 L52,175" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="66" y="172" fill="#222530" font-size="11" font-weight="500" font-family="system-ui, -apple-system, sans-serif">Modul 1: Einführung in KI</text>
  <text x="66" y="188" fill="#71717A" font-size="9" font-weight="300" font-family="system-ui, -apple-system, sans-serif">Grundlagen und Begriffe · 45 Min</text>
  <rect x="232" y="169" width="32" height="18" rx="9" fill="#E8F5E9"/>
  <text x="248" y="182" text-anchor="middle" fill="#4CAF50" font-size="8" font-weight="500" font-family="system-ui, -apple-system, sans-serif">✓</text>

  <!-- Module card 2 - Completed -->
  <rect x="24" y="220" width="252" height="62" rx="10" fill="white" filter="url(#shadow1)"/>
  <circle cx="46" cy="251" r="12" fill="#E8F5E9"/>
  <path d="M40,251 L44,255 L52,247" fill="none" stroke="#4CAF50" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="66" y="244" fill="#222530" font-size="11" font-weight="500" font-family="system-ui, -apple-system, sans-serif">Modul 2: Prompt Engineering</text>
  <text x="66" y="260" fill="#71717A" font-size="9" font-weight="300" font-family="system-ui, -apple-system, sans-serif">Effektive Prompts erstellen · 60 Min</text>
  <rect x="232" y="241" width="32" height="18" rx="9" fill="#E8F5E9"/>
  <text x="248" y="254" text-anchor="middle" fill="#4CAF50" font-size="8" font-weight="500" font-family="system-ui, -apple-system, sans-serif">✓</text>

  <!-- Module card 3 - In Progress -->
  <rect x="24" y="292" width="252" height="62" rx="10" fill="white" filter="url(#shadow1)" stroke="#DDD7FE" stroke-width="1"/>
  <circle cx="46" cy="323" r="12" fill="#F4F0FF"/>
  <text x="46" y="327" text-anchor="middle" fill="#7C5CFC" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">3</text>
  <text x="66" y="316" fill="#222530" font-size="11" font-weight="500" font-family="system-ui, -apple-system, sans-serif">Modul 3: KI-Tools im Unterricht</text>
  <text x="66" y="332" fill="#71717A" font-size="9" font-weight="300" font-family="system-ui, -apple-system, sans-serif">Praxisbeispiele · 90 Min</text>
  <rect x="218" y="313" width="54" height="18" rx="9" fill="#F4F0FF"/>
  <text x="245" y="325.5" text-anchor="middle" fill="#7C5CFC" font-size="8" font-weight="500" font-family="system-ui, -apple-system, sans-serif">Aktiv</text>

  <!-- Module card 4 - Locked -->
  <rect x="24" y="364" width="252" height="62" rx="10" fill="white" filter="url(#shadow1)" opacity="0.7"/>
  <circle cx="46" cy="395" r="12" fill="#F4F4F5"/>
  <text x="46" y="399" text-anchor="middle" fill="#A1A1AA" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">4</text>
  <text x="66" y="388" fill="#A1A1AA" font-size="11" font-weight="500" font-family="system-ui, -apple-system, sans-serif">Modul 4: Datenschutz &amp; Ethik</text>
  <text x="66" y="404" fill="#A1A1AA" font-size="9" font-weight="300" font-family="system-ui, -apple-system, sans-serif">Verantwortungsvoller Einsatz · 45 Min</text>
  <!-- Lock icon -->
  <g transform="translate(244, 386)">
    <rect x="0" y="4" width="12" height="9" rx="2" fill="none" stroke="#A1A1AA" stroke-width="1"/>
    <path d="M2,4 L2,2 A4,4 0 0,1 10,2 L10,4" fill="none" stroke="#A1A1AA" stroke-width="1"/>
  </g>

  <!-- Module card 5 - Locked -->
  <rect x="24" y="436" width="252" height="62" rx="10" fill="white" filter="url(#shadow1)" opacity="0.7"/>
  <circle cx="46" cy="467" r="12" fill="#F4F4F5"/>
  <text x="46" y="471" text-anchor="middle" fill="#A1A1AA" font-size="11" font-weight="600" font-family="system-ui, -apple-system, sans-serif">5</text>
  <text x="66" y="460" fill="#A1A1AA" font-size="11" font-weight="500" font-family="system-ui, -apple-system, sans-serif">Modul 5: Praxisprojekt</text>
  <text x="66" y="476" fill="#A1A1AA" font-size="9" font-weight="300" font-family="system-ui, -apple-system, sans-serif">Eigenes Unterrichtskonzept · 120 Min</text>
  <!-- Lock icon -->
  <g transform="translate(244, 458)">
    <rect x="0" y="4" width="12" height="9" rx="2" fill="none" stroke="#A1A1AA" stroke-width="1"/>
    <path d="M2,4 L2,2 A4,4 0 0,1 10,2 L10,4" fill="none" stroke="#A1A1AA" stroke-width="1"/>
  </g>
</svg>
