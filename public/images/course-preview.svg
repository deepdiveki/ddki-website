  <!-- Header content -->
  <text x="32" y="44" fill="white" font-size="9" font-weight="300" font-family="system-ui, -apple-system, sans-serif" letter-spacing="1.5" opacity="0.7">AKTUELLE FORTBILDUNG</text>
  <text x="32" y="68" fill="white" font-size="15" font-weight="500" font-family="system-ui, -apple-system, sans-serif">KI im Unterricht –</text>
  <text x="32" y="87" fill="white" font-size="15" font-weight="500" font-family="system-ui, -apple-system, sans-serif">Praktische Anwendungen</text>

